<style>
/* =========================================================
   Deal Prism — standalone, offline, system fonts only.
   No CDN, no Google Fonts.

   v8A-18 002B-5 closing frame (Opening-to-Operating Bridge):
   - Adds ONE deliberate final decision frame after Screen 10's final
     step. It is NOT a numbered demo screen: no stage-title, no
     STEP/SCREEN counter — a small "Deal Prism · Final Recommendation"
     label instead. Left = premium dark brand panel echoing the opening
     page (same poster gradient, gold eyebrow, serif wordmark, slogan,
     accented mechanism line); right = light executive decision panel in
     the Screens 1–10 system (conclusion + final ask); a slim governance
     / assurance strip is integrated below. The existing bottom-rail
     style + icon-only controls (Restart · Appendix · Previous · Next)
     are preserved; the Appendix icon opens Appendix G.
   - Routing only: SCREEN_COUNT stays 10 (Screens 1–10 still read "/10");
     a new CLOSING_SCREEN=11 is reached by a normal Next from Screen 10,
     Previous returns to Screen 10's final step, Restart/keyboard intact.
   - No changes to Screens 0–10 wording, Appendices A–G content, Screen 7
     taxonomy/reveal logic, source-proof or no-publish logic. No new
     facts/claims, no PDF links, no horizontal scroll.

   v8A-17 002B-4 rehearsal-readiness QA / stabilization build:
   - Narrow visual-polish + rehearsal-readiness QA pass over the
     approved v8A-16 baseline. No redesign, no wording rewrite, no new
     screens/appendices, no PDF creation/links/previews.
   - Full screen-by-screen + appendix QA performed at constrained
     height: no horizontal scroll, no bottom-rail overlap (the existing
     conditional vertical-scroll fallback engages instead), appendix
     tabs A–G wrap cleanly, routing preserved, keyboard + local/offline
     readiness preserved.
   - Only code change: `overscroll-behavior: contain` added to the two
     scroll containers (.screen main body + .appendix-body) so that when
     the height fallback engages during rehearsal, scrolling cannot
     rubber-band / scroll-chain the whole page. Zero effect on the
     100%-fit executive composition. No content, wording, structure,
     taxonomy, reveal-logic, or risk-control changes.

   v8A-9 002A-7A conditional vertical-scroll fallback + Screen-7
   Step-4 readability rebalance (narrow, fit-first, no redesign):
   - Screens 1–10 main content area (.screen) is now a scroll-safe
     container: overflow-y:auto + overflow-x:hidden + scrollbar-gutter
     stable, with larger bottom padding. At 100% on typical displays it
     still fits with no scrollbar; when zoom / display-scale / a short
     viewport exceeds the safe height between the fixed topbar and the
     fixed bottom rail, the content area scrolls vertically instead of
     hiding content behind the rail. No horizontal scroll is introduced.
     Topbar and bottom rail stay fixed and never overlap content.
   - Screen 0 is untouched (its full-bleed renderer bypasses .screen).
   - Screen 7 Step 4 end-state modestly rebalanced for readability:
     more top padding (clears the "End state" badge), slightly larger
     title / sub / checklist body, more even inner spacing. Composition,
     two-column Week-1 layout, output-block decision and ALL wording
     unchanged. The scroll fallback guarantees it can never clip.
   - No 002A-7B wording updates. No "Angle" on Screen 5. No Appendix F.
     No FD-014 fact changes. No risk-control changes. No new assets.
     No old fixed 1440×810 stage scaling restored.

   v8A-8 002A-7A Screen-7 composition + fit correction (narrow):
   - Compact "Additional outputs" one-line strip removed from Screen 7.
   - Screen 7 secondary outputs restored as visible content-unit blocks
     (Newsletter, Website Snippet, Video Concept, Carousel Text) plus
     Calendar Placement. All 10 outputs now appear as a 5×2 tile grid.
   - Active / secondary visual hierarchy implemented in the Screen 1
     spirit: live tiles use a stronger card (navy edge, white fill,
     LIVE eyebrow); secondary tiles use a quieter card (sand-tinted
     paper fill, thin rule, "NOT OPENED LIVE" eyebrow) — readable and
     credible, never faded, never disabled, never missing-PDF.
   - Expanded live-output cards balanced: every .tile-expanded now
     fills its grid cell (height:100%), e-text rows use the same
     line-clamp baseline, and micro stays bottom-aligned so card
     bottoms align across the four-up row.
   - Review → Approve → Schedule end-state padding, gaps, and heading
     spacing tightened for the final Screen 7 reveal at 1366×768.
   - Week 1 sequence converted to a compact two-column structure
     inside the end-state. Sequence meaning preserved exactly:
     col 1 MON/TUE/WED, col 2 THU/LATER. No new calendar items.
   - No 002A-7B wording updates applied. No "Angle" added to Screen 5.
     No Appendix F added. No FD-014 fact changes. No risk-control
     changes. No new output content. No PDF links.

   v8A-7 002A-7A corrective patch (narrow, fit-only):
   - Topbar separator between brand and stage title replaced with a
     subtle thin vertical rule (no bullet/dot).
   - Bottom rail governance text fixed to a single short string:
     "Internal demo · Human review · No automated publishing · Marketing-owned".
     Per-screen extra cues removed from the rail (still appear on
     dedicated governance screens via existing content).
   - Bottom rail composed left-to-right as: compact governance rail,
     two-line STEP/SCREEN counter (contained), icon-only controls in
     order Restart · Appendix · Previous · Next. No overlap.
   - Bottom rail height kept stable; rail uses flex with min-width:0
     on the governance label so it shortens cleanly under tight widths.
   - Content-safe-area: .screen min-height 0 + flex layout ensures the
     screen body never sits behind the bottom rail.
   - Vertical-fit pass for Screens 6, 7, 10: card paddings, grid gaps,
     min-heights trimmed; Screen 7 final reveal prioritised.
   - Screen 7 secondary outputs collapsed from a faded card row to a
     single compact one-line strip:
     "Additional outputs: Newsletter · Website snippet · Video concept · Carousel".
   - No content changes (FD-014 facts, brief, risk ribbon, prohibited
     claims, output wording, end-state, pilot content, appendices).
   - No 002A-7B wording updates applied.

   v8A-6 chrome / navigation / vertical-fit correction (002A-7A):
   - v8A-5 used as baseline; Screen 0 preserved unchanged.
   - Body-level context line removed from Screens 1–10. The current
     stage title now lives in the topbar beside Deal Prism
     ("Deal Prism · Brief to Outputs"). Method line retained on the
     right and hidden first on narrow viewports.
   - Page-level appendix buttons ("Appendix: Source proof →" etc.)
     removed from screen bodies. The bottom Appendix icon now opens
     a context-relevant appendix target per screen.
   - Bottom rail recomposed. Compact two-line STEP / SCREEN counter
     replaces the old one-line "01 / 10" indicator. STEP updates on
     reveal step; SCREEN updates on screen change.
   - Screen 7 secondary tiles restyled as quiet/collapsed instead
     of looking disabled (lighter neutral background, thinner border,
     smaller label; no opacity dim).
   - Screen 1 paragraph width tuned to avoid orphan-line wrapping
     of the last word; wording unchanged.
   - Vertical density retuned via clamp()-driven paddings, reduced
     card min-heights, and grid gaps so Screens 1–10 fit at 100%
     browser zoom on 1366×768 → 1920×1080 viewports.
   - Screen 0 visual composition is unchanged.

   (Internal file naming retains the W-WS workflow tag; no
    internal terminology appears in audience-facing UI.)
   ========================================================= */

:root {
  --bg: #F1ECE2;
  --bg-deep: #E6DFD0;
  --paper: #FBF8F1;
  --card: #FFFFFF;
  --card-muted: #F7F3EA;
  --rule: #DDD5C2;
  --rule-soft: #E8E1D1;

  --ink: #1A2230;
  --ink-2: #2D3949;
  --ink-mute: #5B6779;
  --ink-faint: #8A93A1;

  --navy: #2D405E;
  --navy-2: #1F2E47;
  --navy-soft: #E2E7EE;
  --sand: #A58851;
  --sand-2: #8E7239;
  --sand-soft: #ECE1C7;

  --amber: #A5701D;
  --amber-bg: #F7E8C8;
  --amber-line: #E4C68A;

  --red: #8E3030;
  --red-bg: #F2DCD7;
  --red-line: #D9B0AA;

  --shadow-sm: 0 1px 0 rgba(40,40,40,.04), 0 1px 2px rgba(40,40,40,.04);
  --shadow-md: 0 1px 0 rgba(40,40,40,.04), 0 8px 24px -12px rgba(40,40,40,.18);

  --serif: ui-serif, "Iowan Old Style", "Charter", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  --sans: -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

  --stage-w: 1440px;
  --stage-h: 810px;
  /* v8A-4: responsive gutter for Screens 1–10. Hugs the viewport on
     small laptops (~24px) and breathes on wide desktops (~clamp upper
     end). Replaces the old fixed 56px gutter that was sized for the
     1440px centered stage. */
  --gutter: clamp(24px, 4.2vw, 72px);
  /* v8A-4: max content width keeps the live area readable on ultra-wide
     monitors without reintroducing the visible side gutters from the
     old centered fixed-stage layout. Approximately 88–94% of typical
     desktop widths use it, then it caps near 16:9 logic territory. */
  --content-max: 1760px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14.5px; line-height: 1.45; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
html, body { height: 100%; }
button { font-family: inherit; }

/* ---------- Stage (v8A-4: full-viewport for Screens 1–10) ----------
   The old centered 1440×810 box with transform-scale produced visible
   empty left/right zones inside the browser viewport. For Screens 1–10
   we drop the centered box entirely: the stage fills 100vw × 100dvh
   with no transform, and lets the topbar / screen body / bottombar lay
   out across the full viewport width. Screen 0 keeps its full-bleed
   override via `body[data-fullbleed="1"]`. */
.viewport { width: 100vw; height: 100vh; height: 100dvh; min-height: 100vh; overflow: hidden; background: var(--bg); display: block; }
.stage { width: 100vw; height: 100vh; height: 100dvh; min-height: 100vh; max-width: none; max-height: none; background: var(--bg); position: relative; transform: none; box-shadow: none; overflow: hidden; display: flex; flex-direction: column; }

/* Screen 0 — break out of the 16:9 framed stage and fill the viewport.
   These overrides are toggled by JS via `body[data-fullbleed="1"]`. */
body[data-fullbleed="1"] { background: #0A0D13; }
body[data-fullbleed="1"] .viewport { background: #0A0D13; }
body[data-fullbleed="1"] #stage {
  width: 100vw !important; height: 100vh !important;
  transform: none !important; box-shadow: none !important;
  border-radius: 0 !important; background: #0A0D13 !important;
  overflow: hidden;
}

/* ---------- Topbar (v8A-5) ----------
   Brand + method line only. No governance/precaution labels in the top
   area — those have moved to the bottom rail. Height unchanged. */
.topbar { height: 44px; flex: 0 0 auto; border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 var(--gutter); gap: 14px; background: var(--paper); }
.brand { font-family: var(--serif); font-weight: 500; font-size: 17px; letter-spacing: -.01em; color: var(--ink); white-space: nowrap; flex: 0 0 auto; }
.brand .mark { display: inline-block; width: 7px; height: 7px; background: var(--navy); margin-right: 10px; transform: translateY(-1px); border-radius: 1px; }
/* v8A-7: replaced the prior bullet/dot brand-sep with a thin vertical
   rule between "Deal Prism" and the current stage title. */
.brand-sep { display: inline-block; width: 1px; height: 18px; background: var(--rule); margin: 0 12px 0 6px; flex: 0 0 auto; border-radius: 0; align-self: center; }
.stage-title { font-family: var(--serif); font-weight: 400; font-size: 16px; color: var(--ink-2); letter-spacing: -.005em; white-space: nowrap; flex: 0 0 auto; }
.divider { width: 1px; height: 18px; background: var(--rule); flex: 0 0 auto; }
.topbar .spacer { flex: 1; min-width: 12px; }
.method-line { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-mute); letter-spacing: -.005em; white-space: nowrap; flex: 0 1 auto; font-weight: 400; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
@media (max-width: 1180px) { .method-line { display: none; } }

/* Governance chip-strip — now lives in the bottom rail. Compact and
   restrained; quiet confidence rather than a warning banner. */
/* v8A-7: governance rail simplified — one fixed short string, no per-screen
   variants. Single ellipsing line; the rail uses flex:1 1 auto + min-width:0
   so it gives way before the counter or icon cluster ever clip. */
.gov-chips { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; white-space: nowrap; flex: 1 1 auto; min-width: 0; overflow: hidden; }
.gov-chips .gc-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--sand); flex: 0 0 5px; box-shadow: 0 0 0 3px rgba(165,136,81,.12); }
.gov-chips .gc-text { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.gov-chips .gc-text .gc-sep { color: var(--ink-faint); opacity: .55; margin: 0 4px; }
@media (max-width: 1440px) { .gov-chips { font-size: 9px; letter-spacing: .12em; } }

/* ---------- Bottombar (v8A-6) ----------
   Left: governance/status rail (quiet confidence).
   Right: compact two-line STEP / SCREEN counter + icon-only control
   cluster — Restart · Appendix · Previous · Next. */
/* v8A-7: bottom rail stays a fixed 52px row, with min-width:0 on the
   governance area so it shortens cleanly without pushing the counter
   or icon cluster off-screen. */
.bottombar { height: 52px; flex: 0 0 auto; border-top: 1px solid var(--rule); background: var(--paper); display: flex; align-items: center; padding: 0 var(--gutter); gap: 16px; }
.bottombar .controls { display: flex; align-items: center; gap: 4px; flex: 0 0 auto; }
.bottombar .controls-sep { width: 1px; height: 20px; background: var(--rule); margin: 0 6px; flex: 0 0 auto; }

.btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 4px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink-2); cursor: pointer; letter-spacing: .01em; display: inline-flex; align-items: center; gap: 8px; transition: background .15s, border-color .15s, color .15s; white-space: nowrap; flex: 0 0 auto; }
.btn:hover:not(:disabled) { background: var(--card-muted); border-color: var(--ink-faint); }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
.btn.primary:hover:not(:disabled) { background: var(--navy-2); border-color: var(--navy-2); }
.btn.ghost { border-color: transparent; background: transparent; color: var(--ink-mute); }
.btn.ghost:hover { color: var(--ink); background: var(--card-muted); }
.btn svg { display: block; }

/* Icon-only button — comfortable hit target, no visible label. */
.icon-btn { width: 34px; height: 34px; padding: 0; border-radius: 4px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink-2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s, color .15s, transform .1s; flex: 0 0 auto; }
.icon-btn:hover:not(:disabled) { background: var(--card-muted); border-color: var(--ink-faint); color: var(--ink); }
.icon-btn:active:not(:disabled) { transform: translateY(1px); }
.icon-btn:disabled { opacity: .3; cursor: not-allowed; }
.icon-btn.ghost { border-color: transparent; background: transparent; color: var(--ink-mute); }
.icon-btn.ghost:hover:not(:disabled) { background: var(--card-muted); color: var(--ink); }
.icon-btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
.icon-btn.primary:hover:not(:disabled) { background: var(--navy-2); border-color: var(--navy-2); color: #fff; }
.icon-btn svg { display: block; }

/* Compact two-line STEP / SCREEN counter.
   v8A-7: narrower padding and tighter column gap to free width for the
   governance rail and icon cluster on smaller laptops. */
.counter { font-family: var(--mono); font-size: 9.5px; line-height: 1.3; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; flex: 0 0 auto; display: grid; grid-template-columns: auto auto; column-gap: 8px; row-gap: 1px; align-items: baseline; color: var(--ink-mute); border-left: 1px solid var(--rule-soft); border-right: 1px solid var(--rule-soft); padding: 0 12px; }
.counter .ct-label { color: var(--ink-mute); letter-spacing: .14em; font-weight: 600; opacity: .85; }
.counter .ct-value { color: var(--ink); font-weight: 600; letter-spacing: .04em; font-variant-numeric: tabular-nums; text-align: right; }

/* ---------- Status labels ---------- */
.statlabel { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; font-family: var(--mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); background: var(--card); border: 1px solid var(--rule); border-radius: 3px; font-weight: 500; white-space: nowrap; }
.statlabel .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-faint); }
.statlabel.amber { background: var(--amber-bg); border-color: var(--amber-line); color: var(--amber); }
.statlabel.amber .dot { background: var(--amber); }
.statlabel.navy { background: var(--navy-soft); border-color: #C8D2DF; color: var(--navy-2); }
.statlabel.navy .dot { background: var(--navy); }
.statlabel.sand { background: var(--sand-soft); border-color: #D9C8A0; color: var(--sand-2); }
.statlabel.sand .dot { background: var(--sand); }
.statlabel.red { background: var(--red-bg); border-color: var(--red-line); color: var(--red); }
.statlabel.red .dot { background: var(--red); }

/* ---------- Screen body (v8A-7 vertical-fit pass) ----------
   The screen sits in a flex column between the topbar and the bottom
   rail (both flex:0 0 auto) so content cannot fall behind the rail.
   Vertical paddings tightened further so dense screens (6, 7, 10) fit
   at 100% browser zoom on a 1366×768 viewport.

   v8A-9 002A-7A conditional vertical-scroll fallback (Screens 1–10):
   The main content area is now a scroll container — overflow-y:auto +
   overflow-x:hidden. At 100% on typical displays content still fits and
   no scrollbar appears. When browser zoom / display scale / a short
   viewport pushes content past the safe height between the topbar and
   the fixed bottom rail, the main area scrolls vertically instead of
   hiding content behind the rail. The topbar and bottom rail remain
   fixed (flex:0 0 auto siblings of this area), so neither overlaps the
   content and the controls / counter / governance rail stay visible.
   A larger bottom padding guarantees the last line clears the rail when
   scrolled to the end. Horizontal scrolling is never introduced.
   scrollbar-gutter:stable keeps the layout from shifting when the
   scrollbar appears. This is a fit-first fallback, NOT a responsive
   redesign: the executive composition at 100% is unchanged. */
.screen { flex: 1 1 auto; display: flex; flex-direction: column; padding: clamp(8px, 1.3vh, 16px) max(var(--gutter), calc((100vw - var(--content-max)) / 2)) clamp(12px, 1.8vh, 20px); overflow-x: hidden; overflow-y: auto; overscroll-behavior: contain; scrollbar-gutter: stable; position: relative; min-height: 0; }
/* Subtle, restrained scrollbar for the main content area — only visible
   when the fallback engages. */
.screen::-webkit-scrollbar { width: 9px; }
.screen::-webkit-scrollbar-track { background: transparent; }
.screen::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
.screen::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
.screen { scrollbar-width: thin; scrollbar-color: var(--rule) transparent; }
.screen-head { display: flex; flex-direction: column; gap: 3px; margin-bottom: clamp(5px, .9vh, 8px); flex: 0 0 auto; }

/* Consolidated context line (audience-facing) — "Screen 01 · Step 1/2 · Premise".
   Replaces the old separate topbar Screen + Step meta blocks. */
.context-line { font-family: var(--mono); font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--sand-2); font-weight: 600; display: inline-flex; align-items: baseline; gap: 10px; }
.context-line .ctx-sep { color: var(--ink-faint); opacity: .55; font-weight: 500; }
.context-line .ctx-screen { color: var(--sand-2); }
.context-line .ctx-step { color: var(--ink-mute); font-weight: 500; }
.context-line .ctx-title { color: var(--ink-2); font-weight: 600; letter-spacing: .14em; }

.eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--sand-2); font-weight: 600; }
.headline { font-family: var(--serif); font-weight: 400; font-size: clamp(28px, 3.2vw, 36px); line-height: 1.06; letter-spacing: -.018em; color: var(--ink); max-width: 1100px; text-wrap: balance; margin: 0; }
.headline em { font-style: italic; color: var(--sand-2); }

/* v8A-3 readability pass: subheadline & body text slightly larger and darker;
   tighter letter-spacing where it hurt legibility on the projection screen.
   v8A-5: short/body lines use clamp() for vertical-fit on shorter laptops.
   v8A-6: text-wrap: pretty on .body-text to avoid one-word orphan lines
   (Screen 1 paragraph in particular). */
.short { font-size: clamp(14.5px, 1.18vw, 16.5px); color: #3D485B; max-width: 820px; margin: 0; text-wrap: pretty; line-height: 1.5; letter-spacing: .002em; }
.body-text { font-size: clamp(13px, 1.05vw, 14.5px); color: var(--ink-2); max-width: 760px; line-height: 1.55; margin: 6px 0 0; text-wrap: pretty; }
.section-h { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); font-weight: 600; margin-bottom: 8px; }

.foot-note { margin-top: auto; padding-top: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
.foot-note .left { display: none; }      /* presenter instructions removed from audience UI */
.foot-note .right { flex: 0 0 auto; }

/* ---------- Reveal ---------- */
[data-reveal-step] { opacity: 0; transform: translateY(8px); transition: opacity .5s ease, transform .5s ease; transition-delay: var(--rd, 0ms); }
[data-reveal-step].in { opacity: 1; transform: translateY(0); }
[data-hide-step].hidden { display: none; }

/* ---------- Grids ---------- */
.grid { display: grid; gap: 12px; }
.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.grid.cols-5 { grid-template-columns: repeat(5, 1fr); }

/* ---------- Cards ---------- */
.card { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 16px 18px; }

/* DealCard (Screen 1) — v8A-3: removed visible FD/C id row; readability bump.
   v8A-5: min-height removed (was 210px) and padding trimmed so the five-card
   row fits without the bottom edges being clipped by the bottom rail. */
.deal-card { display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 13px 15px; position: relative; transition: box-shadow .35s ease, border-color .35s ease, background .35s ease; }
.deal-card .deal-id { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; color: var(--sand-2); text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.deal-card .deal-label { font-family: var(--serif); font-size: 17.5px; font-weight: 500; color: var(--ink); line-height: 1.22; margin: 0 0 8px; }
.deal-card .deal-amount { font-size: 13px; color: var(--ink-2); margin-bottom: 9px; line-height: 1.45; }
.deal-card .proof-row, .deal-card .risk-row { font-size: 12px; color: #4A5566; margin-bottom: 5px; line-height: 1.5; }
.deal-card .proof-row b, .deal-card .risk-row b { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); margin-right: 6px; }
.deal-card .risk-row b { color: var(--red); }
.deal-card.highlight { border-color: var(--sand); box-shadow: 0 0 0 1px var(--sand), 0 20px 40px -20px rgba(165,136,81,.4); background: linear-gradient(180deg, var(--card) 0%, #FCF8EE 100%); }
.deal-card.highlight::after { content: "Working example"; position: absolute; top: -10px; right: 12px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: #fff; background: var(--sand-2); padding: 4px 8px; border-radius: 2px; }

/* Pattern card (Screen 2) — v8A-5: min-height reduced for vertical fit. */
.pattern-card { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 14px; min-height: 140px; display: flex; flex-direction: column; }
.pattern-card .pnum { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--sand-2); text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
.pattern-card .ptitle { font-family: var(--serif); font-size: 18.5px; font-weight: 500; color: var(--ink); line-height: 1.18; margin: 0 0 6px; }
.pattern-card .ptext { font-size: 13.5px; color: #4A5566; line-height: 1.55; }

/* Stage cell (Screen 3) — v8A-5: padding & min-height trimmed. */
.stage-flow { display: grid; grid-template-columns: 1fr 50px 1fr 50px 1fr; gap: 0; align-items: stretch; }
.stage-cell { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 18px; min-height: 170px; display: flex; flex-direction: column; }
.stage-cell .num { font-family: var(--mono); font-size: 10px; letter-spacing: .16em; color: var(--sand-2); text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
.stage-cell .stitle { font-family: var(--serif); font-size: 22px; font-weight: 500; color: var(--ink); line-height: 1.16; margin-bottom: 10px; }
.stage-cell .stext { font-size: 14px; color: #4A5566; line-height: 1.6; }
.connector { display: flex; align-items: center; justify-content: center; position: relative; }
.connector .line { width: 100%; height: 1px; background: var(--rule); position: relative; overflow: hidden; }
.connector .line::after { content: ""; position: absolute; left: -100%; top: 0; height: 1px; width: 100%; background: var(--navy); transition: left .6s ease; }
.connector.in .line::after { left: 0; }
.connector .arrow { position: absolute; right: 0; width: 0; height: 0; border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-left: 6px solid var(--navy); opacity: 0; transition: opacity .25s ease .5s; }
.connector.in .arrow { opacity: 1; }

/* Leakage (Screen 4) — v8A-5: gap & channel padding/min-height trimmed.
   v8A-9: min-height min-content (was 0) so the fill area keeps its
   content height under constrained viewports → the main area scrolls
   instead of the cards being clipped. Still flex:1 → fills at 100%. */
.leakage { display: grid; grid-template-columns: 300px 1fr; gap: 22px; flex: 1; min-height: min-content; }
.leakage .channels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
.channel-card { background: var(--card-muted); border: 1px dashed var(--rule); border-radius: 6px; padding: 12px 14px; min-height: 72px; transition: all .5s ease; opacity: .55; filter: grayscale(.5); }
.channel-card.lit { background: var(--card); border-style: solid; border-color: var(--sand); opacity: 1; filter: none; box-shadow: 0 4px 16px -8px rgba(165,136,81,.4); }
.channel-card .clabel { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; font-weight: 600; }
.channel-card.lit .clabel { color: var(--sand-2); }
.channel-card .ctitle { font-family: var(--serif); font-size: 15px; font-weight: 500; margin: 0 0 4px; }
.channel-card .ctext { font-size: 12.5px; color: #4A5566; line-height: 1.55; }

/* Source card — v8A-7: padding trimmed for Screen 6 vertical fit. */
.source-card { background: var(--card); border: 1px solid var(--navy); border-radius: 6px; padding: 14px 16px 12px; position: relative; box-shadow: 0 8px 30px -16px rgba(45,64,94,.3); }
.source-card::before { content: "Public Source Page"; position: absolute; top: -10px; left: 16px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #fff; background: var(--navy); padding: 4px 8px; border-radius: 2px; }
.source-card .src-id { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; color: var(--navy); font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
.source-card .src-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--ink); line-height: 1.16; margin: 0 0 10px; letter-spacing: -.01em; }
.source-card .src-facts { font-size: 13.5px; color: var(--ink-2); line-height: 1.65; margin: 0; padding: 0; list-style: none; }
.source-card .src-facts li { position: relative; padding-left: 14px; }
.source-card .src-facts li::before { content: ""; position: absolute; left: 0; top: 9px; width: 6px; height: 1px; background: var(--navy); }
.micro { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--rule-soft); }

/* Brief / risk ribbon — v8A-7: padding & inter-section gaps trimmed. */
.brief-card { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 10px 16px; }
.brief-card .b-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.brief-card .b-title { font-family: var(--serif); font-size: 17px; font-weight: 500; margin: 0; white-space: nowrap; }
.fd-tag { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--navy); background: var(--navy-soft); padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; }
.b-section { margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--rule-soft); }
.b-section:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
.b-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.b-label.warn { color: var(--amber); }
.b-list { font-size: 12px; color: var(--ink-2); line-height: 1.34; margin: 0; padding-left: 14px; }
.b-list li::marker { color: var(--ink-faint); }
.b-list.cols { columns: 2; column-gap: 16px; padding-left: 16px; }
.b-list.cols li { break-inside: avoid; }
/* v8A-11: compact lower section (Main framing + Editorial angle) on Screen 6 */
.b-lower { margin-top: 4px; padding-top: 4px; }
.b-lrow { margin-top: 4px; }
.b-lrow:first-child { margin-top: 0; }
.b-lrow .b-label { margin-bottom: 2px; }
.b-ltext { font-size: 12px; color: var(--ink-2); margin: 0; line-height: 1.4; }

.risk-ribbon { background: var(--red-bg); border: 1px solid var(--red-line); border-radius: 6px; padding: 14px 16px 10px; position: relative; }
.risk-ribbon::before { content: "Risk Boundaries"; position: absolute; top: -10px; left: 16px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #fff; background: var(--red); padding: 4px 8px; border-radius: 2px; }
.risk-ribbon .r-title { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--red); margin: 0 0 8px; }
.risk-ribbon .r-text { font-size: 12.5px; color: #6E2424; line-height: 1.55; }

/* Output tiles — v8A-8:
   All ten outputs are visible blocks again. The v8A-7 "Additional
   outputs" one-line strip is removed (.add-outputs kept hidden for
   back-compat). The grid is a 5×2 tile-grid: row 1 = five live
   tiles (Company LinkedIn, Loan-Officer-Style Post, Staff Comments,
   Broker Summary, Approval Checklist), row 2 = five secondary
   tiles (Newsletter, Website Snippet, Video Concept, Carousel
   Text, Calendar Placement). Hierarchy follows Screen 1: active
   blocks read stronger; secondary blocks are quieter but remain
   readable and credible — never faded, never disabled-looking,
   never a missing-PDF placeholder. */
.tile-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
.tile { background: var(--card); border: 1px solid var(--rule); border-radius: 5px; padding: 6px 10px 7px; min-height: 0; display: flex; flex-direction: column; position: relative; }

/* Live tiles: stronger card — white fill, navy edge. */
.tile.live { border-color: var(--navy); box-shadow: 0 1px 0 rgba(45,64,94,.04), 0 4px 12px -10px rgba(45,64,94,.3); }
.tile.live .t-num { color: var(--navy); }

/* Secondary tiles: quiet card — sand-tinted paper fill, soft rule.
   Visible, readable, credible — NOT a disabled state. No opacity dim. */
.tile.secondary { background: var(--card-muted); border-color: var(--rule-soft); }
.tile.secondary .t-num { color: var(--ink-faint); }
.tile.secondary .t-title { color: var(--ink-2); }
.tile.secondary .t-sub { color: var(--ink-mute); }

.tile .t-num { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--ink-faint); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
.tile .t-title { font-family: var(--serif); font-size: 12.5px; font-weight: 500; color: var(--ink); margin: 0 0 1px; line-height: 1.18; }
.tile .t-sub { font-size: 10.5px; color: #4A5566; line-height: 1.32; }
.tile .t-tag { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--ink-faint); text-transform: uppercase; margin-top: 6px; }

/* Row caption above each tile row — sits flush-left with the grid,
   thin rule extends across remaining width. Live caption is tinted
   navy; secondary caption is muted ink. */
.tile-row-label { font-family: var(--mono); font-size: 9px; letter-spacing: .16em; font-weight: 600; text-transform: uppercase; color: var(--ink-mute); display: flex; align-items: center; gap: 10px; margin: 0 0 3px; line-height: 1; }
.tile-row-label .trl-text { white-space: nowrap; }
.tile-row-label .trl-rule { flex: 1 1 auto; height: 1px; background: var(--rule-soft); }
.tile-row-label.live .trl-text { color: var(--navy); }
.tile-row-label.control .trl-text { color: var(--sand-2); }

/* v8A-14: Screen 7 three-group taxonomy.
   Group 1 (live-opened) uses the strong .tile.live card in a 4-up grid;
   Group 2 (additional outputs) uses the quiet .tile.secondary card in a
   6-up grid; Group 3 (control/planning artifacts) is a slim, visually
   distinct governance row — dashed edge, sand eyebrow — never equal in
   weight to the audience-facing content tiles. */
.tile-grid.g4 { grid-template-columns: repeat(4, 1fr); }
.tile-grid.g6 { grid-template-columns: repeat(6, 1fr); }

/* v8A-22: unified "Demo content units" grid. All units share one calm card
   family and read as visually equal and credible. The earlier "Shown live"
   cue (pill + navy highlight on three units) has been removed so the screen
   shows one unified Deal Prism content family, not internal presentation
   mechanics. */
.tile .t-num { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

/* v8A-22: Screen 7 planned control / planning artifacts. Quieter than the
   demo content units, but a readable light-grey governance treatment so they
   never disappear into the paper background: solid (not dashed) readable
   border, subdued grey fill, grey — not sand/amber — eyebrow, readable title
   and sub text. No hover, no pointer cursor, no click behaviour. Never red. */
.artifact-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.artifact-chip { background: #EEEAE0; border: 1px solid #C8C0AF; border-radius: 5px; padding: 5px 11px 6px; display: flex; flex-direction: column; }
.artifact-chip .a-eyebrow { font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; font-weight: 600; color: var(--ink-mute); margin-bottom: 1px; }
.artifact-chip .a-title { font-family: var(--serif); font-size: 11.5px; font-weight: 500; color: var(--ink-2); line-height: 1.16; margin: 0 0 1px; }
.artifact-chip .a-sub { font-size: 9.5px; color: var(--ink-mute); line-height: 1.3; }

/* v8A-7 "Additional outputs" one-line strip — removed in v8A-8.
   Class retained for back-compat but never rendered. */
.add-outputs { display: none; }

/* Expanded live-output cards — v8A-8: each card now fills its grid
   row (height:100% + parent reveal-step wrapper made flex) so the
   four cards in the .grid.cols-4 row share a baseline and align
   their bottoms. Padding and line-height tightened slightly. */
.tile-expanded { background: var(--card); border: 1px solid var(--navy); border-radius: 6px; padding: 8px 11px 9px; display: flex; flex-direction: column; position: relative; box-shadow: var(--shadow-md); height: 100%; min-height: 0; }
.tile-expanded .e-tag { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; font-weight: 600; color: var(--navy); text-transform: uppercase; margin-bottom: 3px; }
.tile-expanded .e-title { font-family: var(--serif); font-size: 13.5px; font-weight: 500; color: var(--ink); margin: 0 0 4px; line-height: 1.18; }
.tile-expanded .e-text { font-size: 11px; color: var(--ink-2); line-height: 1.4; margin: 0 0 3px; }
.tile-expanded .e-text.quote { font-style: italic; border-left: 2px solid var(--sand); padding-left: 8px; color: var(--ink); }
.tile-expanded .micro { margin-top: auto; padding-top: 4px; }
/* Stretch reveal-step wrappers around expanded tiles so all four
   cells in the row are equal height. */
.tile-expanded-row > [data-reveal-step] { display: flex; min-height: min-content; }
.tile-expanded-row > [data-reveal-step] > .tile-expanded { flex: 1 1 auto; }

/* End-state area (Screen 7 final reveal) — v8A-9: modestly rebalanced
   for readability. v8A-8 fit was correct but slightly over-compressed;
   the "End state" badge sat tight against the Review → Approve →
   Schedule title and the checklist's last word risked touching the
   bottom edge. v8A-9 restores breathing room: a touch more top padding
   (clears the badge), a slightly larger title / sub / body, and more
   even inner spacing. Composition, two-column Week-1 layout and all
   wording are unchanged; the conditional scroll fallback now guarantees
   the block is never clipped even if a constrained height pushes it
   past the safe area. */
.endstate { background: linear-gradient(180deg, var(--paper) 0%, var(--card-muted) 100%); border: 1px solid var(--navy); border-radius: 8px; padding: 18px 16px 13px; display: flex; flex-direction: column; gap: 8px; position: relative; box-shadow: 0 12px 36px -18px rgba(45,64,94,.35); }
.endstate::before { content: "End state"; position: absolute; top: -11px; left: 18px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #fff; background: var(--navy); padding: 3px 8px; border-radius: 2px; }
.endstate .es-head { display: flex; flex-direction: column; gap: 2px; }
.endstate .es-title { font-family: var(--serif); font-size: 16.5px; font-weight: 500; color: var(--ink); margin: 0; letter-spacing: -.005em; line-height: 1.2; }
.endstate .es-title .arr { color: var(--sand-2); margin: 0 5px; font-weight: 400; }
.endstate .es-sub { font-size: 11.5px; color: var(--ink-mute); line-height: 1.45; }
.endstate .es-body { display: grid; grid-template-columns: 1.2fr 1fr; gap: 11px; }
.endstate .es-col { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 9px 12px 9px; }
.endstate .es-col h5 { font-family: var(--serif); font-size: 13px; font-weight: 500; margin: 0 0 3px; line-height: 1.22; }
.endstate .es-col .es-mono { font-family: var(--mono); font-size: 9.5px; letter-spacing: .14em; color: var(--sand-2); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
.endstate .es-col p { font-size: 11px; color: var(--ink-2); line-height: 1.5; margin: 0; }
.endstate .cal-row { display: grid; grid-template-columns: 46px 1fr; gap: 6px; font-size: 11px; padding: 0; color: var(--ink-2); line-height: 1.4; }
.endstate .cal-row b { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; color: var(--sand-2); font-weight: 600; }
.endstate .cal-row.later b, .endstate .cal-row.later span { color: var(--ink-mute); }
/* Week 1 two-column subgrid inside the right end-state column.
   Row-major fill: items 1-2 = row 1 (MON, THU); 3-4 = row 2 (TUE,
   LATER); 5 = row 3 (WED). Reading column-down therefore gives
   col 1 = MON / TUE / WED and col 2 = THU / LATER. */
.endstate .es-cal-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 12px; row-gap: 3px; margin-top: 2px; }
.endstate .es-cal-grid .cal-row { padding: 0; }
.endstate .es-govern { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.endstate .gtag { display: flex; align-items: flex-start; gap: 8px; background: var(--card); border: 1px solid var(--rule); border-radius: 4px; padding: 8px 10px; font-size: 11.5px; color: var(--ink-2); line-height: 1.4; }
.endstate .gtag .gicon { width: 14px; height: 14px; flex: 0 0 14px; margin-top: 1px; }
.endstate .gtag strong { font-weight: 600; color: var(--ink); display: block; font-size: 12px; margin-bottom: 1px; }

/* Approval gates (Screen 9) — v8A-5: min-height & padding trimmed. */
.gate-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.gate-card { background: var(--card); border: 1px solid var(--rule); border-radius: 5px; padding: 11px 13px; min-height: 110px; display: flex; flex-direction: column; }
.gate-card .g-step { font-family: var(--mono); font-size: 10px; letter-spacing: .16em; font-weight: 600; color: var(--sand-2); text-transform: uppercase; margin-bottom: 6px; }
.gate-card .g-title { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--ink); margin: 0 0 6px; line-height: 1.2; }
.gate-card .g-text { font-size: 12.5px; color: #4A5566; line-height: 1.5; }

.lock-card { background: linear-gradient(180deg, #1F2E47 0%, #2D405E 100%); color: #fff; border-radius: 6px; padding: 14px 16px; position: relative; border: 1px solid var(--navy); }
.lock-card .l-title { font-family: var(--serif); font-size: 16px; font-weight: 500; margin: 0 0 4px; color: #fff; }
.lock-card .l-text { font-size: 12px; color: rgba(255,255,255,.78); line-height: 1.5; margin: 0; }
.lock-card .lock-icon { position: absolute; top: 14px; right: 14px; width: 18px; height: 18px; }

/* Mini card */
.mini-card { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 14px 16px; }
.mini-card .m-title { font-family: var(--serif); font-size: 15px; font-weight: 500; margin: 0 0 4px; }
.mini-card .m-text { font-size: 13px; color: #4A5566; line-height: 1.55; margin: 0; }
.mini-card.amber { background: var(--amber-bg); border-color: var(--amber-line); }
.mini-card.amber .m-title { color: var(--amber); }
.mini-card.amber .m-text { color: #6F4D14; }
.mini-card.red { background: var(--red-bg); border-color: var(--red-line); }
.mini-card.red .m-title { color: var(--red); }
.mini-card.red .m-text { color: #6E2424; }
.mini-card.navy { background: var(--navy-soft); border-color: #C8D2DF; }
.mini-card.navy .m-title { color: var(--navy-2); }
.mini-card.navy .m-text { color: #3A4A66; }

/* Chain (Screen 5) */
.chain-canvas { background: radial-gradient(circle at 20% 30%, rgba(165,136,81,.06), transparent 50%), radial-gradient(circle at 80% 70%, rgba(45,64,94,.06), transparent 50%), var(--paper); border: 1px solid var(--rule); border-radius: 8px; padding: 24px; flex: 1; display: grid; grid-template-rows: auto auto; align-content: center; gap: 16px; min-height: min-content; }
.chain-head { font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--sand-2); font-weight: 600; }
.chain-nodes { display: flex; align-items: stretch; gap: 6px; }
.chain-node { flex: 1 1 0; min-width: 0; background: var(--card); border: 1px solid var(--navy); border-radius: 5px; padding: 20px 12px; box-shadow: 0 6px 18px -10px rgba(45,64,94,.4); display: flex; flex-direction: column; }
.chain-node .cn-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--sand-2); text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.chain-node .cn-title { font-family: var(--serif); font-size: 13.5px; line-height: 1.22; color: var(--ink); }
.chain-node .cn-line { font-size: 11px; line-height: 1.4; color: var(--ink-2); margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--rule-soft); }
.chain-arrow { display: flex; align-items: center; color: var(--ink-faint); font-size: 13px; flex: 0 0 auto; }

/* Relationship flow (Screen 8) — v8A-9: min-height min-content (was 0)
   for the scroll-safe fallback; flex:1 still fills at 100%. */
.rel-flow { display: grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 16px; flex: 1; min-height: min-content; }
.rel-col { display: flex; flex-direction: column; gap: 10px; }
.rel-col-head { font-family: var(--mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--sand-2); font-weight: 600; margin-bottom: 2px; }

/* Pilot (Screen 10) — v8A-7: padding & grid gaps trimmed for vertical fit. */
.pilot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pilot-card { background: var(--card); border: 1px solid var(--rule); border-radius: 6px; padding: 11px 14px; display: flex; flex-direction: column; }
.pilot-card .ptag { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--sand-2); text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.pilot-card .ptitle { font-family: var(--serif); font-size: 18px; font-weight: 500; margin: 0 0 7px; letter-spacing: -.005em; }
.pilot-card .plist { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; margin: 0; padding: 0; list-style: none; }
.pilot-card .plist li { position: relative; padding-left: 14px; margin-bottom: 2px; }
.pilot-card .plist li::before { content: ""; position: absolute; left: 0; top: 9px; width: 6px; height: 1px; background: var(--sand); }
.decision-card { background: var(--navy); color: #fff; border-radius: 6px; padding: 14px 16px; border: 1px solid var(--navy); }

/* =========================================================
   Deal Prism — opening page (Screen 0)
   Full-bleed two-layer hero media system:
     A. Background fill (cover, blurred, dimmed) — kills empty side zones.
     B. Foreground hero video (preserves 16:9, shifted right) — primary subject.
   ========================================================= */
.intro-stage {
  position: absolute; inset: 0;
  background: #0A0D13; overflow: hidden;
  display: block; z-index: 5;
  /* Tunable: how far right of viewport-center the foreground hero sits.
     Acceptable manual range: 120px – 180px. */
  --hero-shift-x: 120px;
}

/* (A) Background fill layer — atmospheric only */
.intro-bg {
  position: absolute; inset: 0; z-index: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center center;
  /* Pushed back hard so it never competes with the foreground. */
  filter: blur(36px) saturate(.55) brightness(.32);
  transform: scale(1.22); /* hide blur edge halo */
  opacity: 0; transition: opacity 1.4s ease;
}
.intro-bg.ready { opacity: .85; }
.intro-poster {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 70% 50%, #2A3243 0%, #141925 55%, #0A0D13 100%);
}

/* (B) Foreground hero video — composition-correct 16:9, shifted right by --hero-shift-x */
.intro-fg-wrap {
  position: absolute; inset: 0; z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.intro-fg {
  position: absolute;
  height: 100vh;
  width: auto;
  aspect-ratio: 16 / 9;
  top: 50%;
  left: calc(50% + var(--hero-shift-x));
  right: auto;
  transform: translate(-50%, -50%);
  object-fit: contain;
  filter: saturate(.96) contrast(1.03);
  opacity: 0; transition: opacity 1.2s ease;
}
.intro-fg.ready { opacity: 1; }

/* Soft seam between foreground video and background fill (right edge). */
.intro-seam {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    linear-gradient(270deg,
      rgba(10,13,19,.55) 0%,
      rgba(10,13,19,.18) 6%,
      rgba(10,13,19,0) 16%);
}

/* Left-only protective gradient. The center/right video reads clean. */
.intro-vignette {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background:
    linear-gradient(90deg,
      rgba(10,13,19,.92) 0%,
      rgba(10,13,19,.78) 16%,
      rgba(10,13,19,.46) 32%,
      rgba(10,13,19,.14) 48%,
      rgba(10,13,19,0)   62%),
    linear-gradient(180deg,
      rgba(10,13,19,.18) 0%,
      rgba(10,13,19,0) 16%,
      rgba(10,13,19,0) 80%,
      rgba(10,13,19,.42) 100%);
}

.intro-chrome {
  position: absolute; inset: 0; z-index: 4;
  display: grid; grid-template-rows: 1fr auto;
  padding: clamp(40px, 5.5vh, 64px) clamp(48px, 6vw, 96px);
  pointer-events: none;
  gap: clamp(16px, 2.4vh, 28px);
}
.intro-chrome > * { pointer-events: auto; }

.intro-body { display: flex; align-items: center; min-height: 0; }
.intro-content {
  max-width: 620px;
  display: flex; flex-direction: column;
  gap: 22px;
}

}

/* Subtitle — readable secondary line, sits close to the slogan. */

  font-weight: 400;
  color: rgba(255,255,255,.86);

/* Mechanism line — light first-reveal / transition cue toward Screen 1.
   Sits below the explainer, separated by the rule, treated quieter than the
   slogan but more deliberate than a caption.

   v8A-2: font size reduced ~11% and vertical position lifted ~14px to
   improve overall balance after the supporting micro-line was removed.
   Reveal is driven by --mechanism-reveal-progress (0–1), updated each frame
   from the foreground intro video's currentTime while Screen 0 is active. */
.intro-mechanism {
  --mechanism-reveal-progress: 1;            /* default: fully shown (fallback-safe) */
  --mechanism-reveal-soft: 28px;             /* soft trailing edge for cinematic feel */

  font-family: var(--serif);
  font-size: clamp(13.8px, 1.05vw, 16.5px);  /* ~11% smaller than v8A */
  font-weight: 400;
  line-height: 1.45;
  letter-spacing: -.004em;
  color: rgba(255,255,255,.78);
  margin: -10px 0 0;                          /* lifted ~14px vs v8A (was 4px) */
  max-width: 520px;
  text-shadow: 0 1px 18px rgba(0,0,0,.4);

  /* Left-to-right mask. The mask layout is what changes; the text layout
     never shifts — only the visible portion changes. */
  -webkit-mask-image: linear-gradient(
    to right,
    #000 0,
    #000 calc(var(--mechanism-reveal-progress) * 100%),
    rgba(0,0,0,0) calc(var(--mechanism-reveal-progress) * 100% + var(--mechanism-reveal-soft))
  );
          mask-image: linear-gradient(
    to right,
    #000 0,
    #000 calc(var(--mechanism-reveal-progress) * 100%),
    rgba(0,0,0,0) calc(var(--mechanism-reveal-progress) * 100% + var(--mechanism-reveal-soft))
  );
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
  /* When the reveal controller is active it sets data-reveal="animating"
     and starts at 0; until then we stay at 1 (fully shown) so the line is
     never permanently hidden in any fallback path. */
}
/* v8A-3 Screen 0 flash-fix:
   The mechanism line is armed-hidden in the markup (data-reveal="armed")
   so the very first paint already has progress=0. The JS reveal controller
   transitions it to data-reveal="animating" inside the same synchronous
   render pass; on any failure / metadata-timeout / reduced-motion path it
   removes the attribute, which falls back to the default progress=1 (fully
   shown). Default progress remains 1 so the line is never permanently hidden. */
.intro-mechanism[data-reveal="armed"],
.intro-mechanism[data-reveal="animating"] {
  --mechanism-reveal-progress: 0;
}
.intro-mechanism .im-accent {
  color: #E5CFA0;
  font-style: italic;
}

@media (prefers-reduced-motion: reduce) {
  /* Reduced-motion fallback: show full mechanism line statically, no reveal. */
  .intro-mechanism { --mechanism-reveal-progress: 1 !important; }
}

/* =========================================================

<script>
/* =========================================================
   Deal Prism — single-file standalone (vanilla JS).
   (Internal workflow tag W-WS preserved only in code/comments;
    no visible audience-facing reference.)
   ========================================================= */
"use strict";

/* Governance-chip presets per screen (v8A-5: now rendered in the bottom
   rail rather than the topbar). Every screen surfaces the four required
   cues via GOV_ALWAYS; per-screen entries add optional contextual cues
   sparingly so the rail never reads as a warning banner. */
const GOV_ALWAYS = [
  "Internal demo only",
  "Human Rubicon review required",
  "No automated publishing",
  "Marketing-owned workflow",
];
const GOV_BY_SCREEN = {
  1: [],
  2: [],
  3: [],
  4: [],
  5: ["AI pre-screen only"],
  6: ["AI pre-screen only"],
  7: ["Draft, not public-approved"],
  8: [],
  9: ["Leadership-governed"],
 10: ["Leadership-governed"],
};

/* Bottom-rail governance text (v8A-7).
   Single fixed short string per the 002A-7A spec. Per-screen variants
   removed from the rail (longer governance cues still appear on the
   dedicated governance screens via existing content). */
const BOTTOM_RAIL_GOV = "Internal demo · Human review · No automated publishing · Marketing-owned";
const BOTTOM_RAIL_GOV_COMPACT = "Internal demo · Human review · No auto-publish · Marketing-owned";

function govChips(n) {
  // n is intentionally unused — the bottom rail no longer varies by screen.
  const items = BOTTOM_RAIL_GOV.split(" · ");
  return `
    <div class="gov-chips" aria-label="Governance">
      <span class="gc-dot" aria-hidden="true"></span>
      <span class="gc-text">${items.map((t, i) => `${i ? `<span class="gc-sep">·</span>` : ""}${esc(t)}`).join("")}</span>
    </div>
  `;
}

/* Compact two-line STEP / SCREEN counter (v8A-6).
   Replaces the old "01 / 10" one-liner. STEP updates when reveal step
   changes; SCREEN updates when the screen changes. */
function counterHTML(n) {
  const ms = (MAX_STEPS[n] ?? 0) + 1;
  const curStep = Math.min(state.step + 1, ms);
  const cur = String(n).padStart(1, "0");
  const tot = String(SCREEN_COUNT);
  return `
    <div class="counter" id="counter" aria-label="Step ${curStep} of ${ms}, screen ${cur} of ${tot}">
      <span class="ct-label">Step</span><span class="ct-value">${curStep}/${ms}</span>
      <span class="ct-label">Screen</span><span class="ct-value">${cur}/${tot}</span>
    </div>
  `;
}

/* Context-relevant appendix target per screen — used by the bottom
   Appendix icon. */
const APPENDIX_BY_SCREEN = {
  1: "A", 2: "C", 3: "A", 4: "A", 5: "A",
  6: "A", 7: "F", 8: "A", 9: "B", 10: "D",
  11: "F",
};
function appendixForScreen(n) { return APPENDIX_BY_SCREEN[n] || "A"; }

/* v8A-6: body-level context line removed from Screens 1–10.
   The current stage title now lives in the topbar beside Deal Prism.
   This stub remains so any residual call site renders nothing rather
   than failing. */
function contextLine(n) { return ""; }

/* Topbar stage-title fragment — "Deal Prism · [Current stage title]".
   Updated on every render so it tracks the active screen. */
function stageTitleHTML(n) {
  const title = SCREEN_CONTEXT_TITLES[n];
  if (!title) return "";
  return `<span class="brand-sep" aria-hidden="true"></span><span class="stage-title" id="stage-title">${esc(title)}</span>`;
}

/* Audience-facing screen titles used in the consolidated context line. */
const SCREEN_CONTEXT_TITLES = {
  1:  "Premise",
  2:  "Market Rhythm",
  3:  "Gap is Rhythm",
  4:  "Leakage",
  5:  "Transformation Moment",
  6:  "Page to Structured Brief",
  7:  "Brief to Outputs",
  8:  "Broker & Staff",
  9:  "Governance",
 10:  "Pilot",
};

/* ---------- HTML helpers ---------- */
const h = (s) => String(s == null ? "" : s);
const esc = (s) => h(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

/* ---------- State ---------- */
const SCREEN_COUNT = 10;
/* v8A-18 002B-5: the closing frame is an extra screen index beyond the
   numbered demo (SCREEN_COUNT stays 10 so Screens 1–10 still read "/10").
   It is reached by a normal Next from Screen 10's final step. */
const CLOSING_SCREEN = 11;
const MAX_STEPS = { 0:0, 1:1, 2:0, 3:2, 4:1, 5:0, 6:2, 7:3, 8:2, 9:1, 10:1, 11:0 };
const SCREEN_TITLES = { 0:"Deal Prism", 1:"Premise", 2:"Market rhythm", 3:"Gap is rhythm", 4:"Leakage", 5:"Transformation moment", 6:"Page → brief", 7:"Brief → outputs", 8:"Broker & staff", 9:"Governance", 10:"Pilot" };

/* Persistent status labels per screen */
const LABELS = {
  1:[{t:"Internal demo only"},{t:"Human Rubicon review required",c:"amber"}],
  2:[{t:"Light market context"},{t:"Details in appendix"}],
  3:[{t:"Marketing-owned workflow",c:"navy"}],
  4:[{t:"Source-bound proof",c:"sand"}],
  5:[{t:"AI pre-screen only",c:"navy"},{t:"No automated publishing",c:"amber"}],
  6:[{t:"Source-bound brief",c:"sand"},{t:"Controls before outputs",c:"amber"}],
  7:[{t:"Draft, not public-approved",c:"amber"},{t:"Human Rubicon review required",c:"amber"}],
  8:[{t:"Optional staff amplification"},{t:"Marketing-owned workflow",c:"navy"}],
  9:[{t:"No automated publishing",c:"amber"},{t:"Human Rubicon review required",c:"amber"},{t:"Leadership-governed",c:"navy"}],
 10:[{t:"Public-source-only pilot",c:"sand"},{t:"No internal loan files",c:"amber"}],
};

/* Debug-mode (clickable progress dots) if URL has ?debug or #debug */
const DEBUG = /[?#&]debug\b/.test(location.search + location.hash);

const state = {
  screen: 0,
  step: 0,
  appendix: null,  // null | 'A'|'B'|'C'|'D'|'E'
};

/* ---------- Status label HTML ---------- */
function statLabel(l) {
  return `<span class="statlabel ${l.c||""}"><span class="dot"></span>${esc(l.t)}</span>`;
}

/* ---------- Foot-note helpers ----------
   v8A-6: page-level appendix buttons are removed from screen bodies.
   `appendixBtn()` is preserved but now returns an empty string so any
   residual call site renders nothing rather than failing. The bottom
   Appendix icon already provides context-relevant access. */
function footNote(left, right) {
  return "";
}
function appendixBtn(target, label) {
  return "";
}

   =================================================================== */

function applyReveal() {
  // reveal
  document.querySelectorAll("#screen-body [data-reveal-step]").forEach(el => {
    const s = parseInt(el.dataset.revealStep, 10);
    el.classList.toggle("in", s <= state.step);
  });
  // hide-after
  document.querySelectorAll("#screen-body [data-hide-step]").forEach(el => {
    const s = parseInt(el.dataset.hideStep, 10);
    el.classList.toggle("hidden", s <= state.step);
  });
  // S4 channel "lit" state (after step 0)
  document.querySelectorAll("#screen-body [data-channel-step]").forEach(el => {
    const s = parseInt(el.dataset.channelStep, 10);
    el.classList.toggle("lit", s <= state.step);
  });
  // S1 FD-014 highlight (after step 1)
  document.querySelectorAll("#screen-body [data-highlight-step]").forEach(el => {
    const s = parseInt(el.dataset.highlightStep, 10);
    el.classList.toggle("highlight", s <= state.step);
  });
  // foot-note step-aware text
  document.querySelectorAll("#screen-body [data-step-text]").forEach(el => {
    try {
      const map = JSON.parse(el.dataset.stepText);
      const k = String(state.step);
      if (map[k] != null) el.textContent = map[k];

function next() {
  if (state.appendix) return; // do not advance while appendix is open
  const ms = MAX_STEPS[state.screen] ?? 0;
  if (state.step < ms) {
    state.step += 1;
    applyReveal();
    updateNavButtons();
  } else if (state.screen < SCREEN_COUNT) {
    state.screen += 1;
    state.step = 0;
    render();
  } else if (state.screen === SCREEN_COUNT) {
    // v8A-18: a normal Next from Screen 10's final step opens the closing frame.
    state.screen = CLOSING_SCREEN;
    state.step = 0;
    render();
  }
}
function prev() {
  if (state.appendix) return;
  if (state.step > 0) {
    state.step -= 1;
    applyReveal();
    updateNavButtons();
  } else if (state.screen > 0) {
    state.screen -= 1;
    state.step = MAX_STEPS[state.screen] ?? 0;
    render();
  }
}
function restart() {
  state.screen = 0;
  state.step = 0;
  state.appendix = null;
  render();
}
function jumpTo(n) {
  if (!DEBUG) return; // ticks are not free-jump in normal mode
  state.screen = n;
  state.step = MAX_STEPS[n] ?? 0;

/* ---------- Intro video controller ----------
   Behavior on Screen 0: autoplay once muted (both layers), hold the final
   frame, then silently restart after INTRO_REPLAY_DELAY_MS. Background fill
   mirrors the foreground for atmosphere. Hidden manual restart via numeric
   keypad "+" (NumpadAdd) when Screen 0 is active.

   v8A-2: the foreground video (id="intro-video") also drives a cinematic
   left-to-right reveal of the mechanism line. Reveal progress is computed
   from the foreground video's currentTime and exposed as the CSS variable
   --mechanism-reveal-progress on #intro-mechanism. The blurred background
   layer is NOT used as a timing source. */
const INTRO_REPLAY_DELAY_MS = 10000;
const MECHANISM_REVEAL_START_S = 1.5;
const MECHANISM_REVEAL_FALLBACK_DURATION_S = 8.0;  /* used only if metadata unavailable */
let introReplayTimer = null;
let mechanismRafId = null;

function clearIntroReplay() {
  if (introReplayTimer) { clearTimeout(introReplayTimer); introReplayTimer = null; }
}
function introLayers() {
  return [
    document.getElementById("intro-video"),  // foreground (primary)
    document.getElementById("intro-bg"),     // background fill
  ].filter(Boolean);
}

function prefersReducedMotion() {
  try { return window.matchMedia("(prefers-reduced-motion: reduce)").matches; }
  catch (_) { return false; }
}

/* Reset the mechanism-line reveal to 0 and hold it hidden until the
   foreground video's currentTime reaches MECHANISM_REVEAL_START_S, then
   smoothly reveal left-to-right until the video ends. Safe to call any
   number of times; later calls cancel the previous animation loop. */
function resetIntroMechanismReveal() {
  cancelIntroMechanismReveal();
  const el = document.getElementById("intro-mechanism");
  const fg = document.getElementById("intro-video");
  if (!el) return;

  // Fallback paths: reduced motion, missing video, broken video element.
  if (prefersReducedMotion() || !fg) {
    el.style.setProperty("--mechanism-reveal-progress", "1");
    el.removeAttribute("data-reveal");
    return;
  }

  el.setAttribute("data-reveal", "animating");
  el.style.setProperty("--mechanism-reveal-progress", "0");

  const tick = () => {
    // Bail out if we left Screen 0 or the element vanished.
    if (state.screen !== 0 || !document.body.contains(el)) {
      cancelIntroMechanismReveal();
      return;
    }
    const t = (typeof fg.currentTime === "number") ? fg.currentTime : 0;
    const d = (isFinite(fg.duration) && fg.duration > MECHANISM_REVEAL_START_S + 0.1)
      ? fg.duration
      : (MECHANISM_REVEAL_START_S + MECHANISM_REVEAL_FALLBACK_DURATION_S);
    let p = (t - MECHANISM_REVEAL_START_S) / (d - MECHANISM_REVEAL_START_S);
    if (!isFinite(p)) p = 1;
    p = Math.max(0, Math.min(1, p));
    el.style.setProperty("--mechanism-reveal-progress", p.toFixed(4));
    if (p >= 1) {
      // Reveal complete: hold full visibility until the next restart.
      el.removeAttribute("data-reveal");
      mechanismRafId = null;
      return;
    }
    mechanismRafId = requestAnimationFrame(tick);
  };
  mechanismRafId = requestAnimationFrame(tick);
}

function cancelIntroMechanismReveal() {
  if (mechanismRafId != null) {
    cancelAnimationFrame(mechanismRafId);
    mechanismRafId = null;
  }
}

/* If the foreground video genuinely fails to load, surface the full
   mechanism line statically so it is never permanently hidden. */
function handleIntroVideoFailure() {
  cancelIntroMechanismReveal();
  const el = document.getElementById("intro-mechanism");
  if (!el) return;
  el.removeAttribute("data-reveal");
  el.style.setProperty("--mechanism-reveal-progress", "1");
}

function restartIntroVideo() {
  clearIntroReplay();
  introLayers().forEach(v => {
    try { v.currentTime = 0; } catch (_) {}
    v.muted = true;
    const p = v.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
  });
  // Every restart — automatic, manual, or programmatic — must also reset
  // the mechanism-line reveal so it replays in sync with the video.
  resetIntroMechanismReveal();
}

/* ---------- Bindings ---------- */
function bindChrome() {
  // Screen 0 — intro page bindings.
  if (state.screen === 0) {
    const fg = document.getElementById("intro-video");
    const bg = document.getElementById("intro-bg");

    [fg, bg].filter(Boolean).forEach((v) => {
      // Hard-mute (defense in depth) and fade in on data.
      v.muted = true;
      v.volume = 0;
      const onReady = () => v.classList.add("ready");
      if (v.readyState >= 2) onReady();
      else {
        v.addEventListener("loadeddata", onReady, { once: true });
        v.addEventListener("canplay", onReady, { once: true });
      }
      const p = v.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    });

    // Foreground drives the cycle. Background mirrors it (pauses when fg ends,
    // restarts on the same schedule via restartIntroVideo).
    if (fg) {
      fg.addEventListener("ended", () => {
        try { fg.pause(); } catch (_) {}
        try { bg && bg.pause(); } catch (_) {}
        clearIntroReplay();
        introReplayTimer = setTimeout(() => {
          if (state.screen !== 0) return;
          restartIntroVideo();
        }, INTRO_REPLAY_DELAY_MS);
      });
      // If the background somehow finishes first, keep it paused on its last
      // frame; the foreground "ended" handler is the source of truth.
      if (bg) {
        bg.addEventListener("ended", () => { try { bg.pause(); } catch (_) {} });
      }

      // Mechanism-line reveal — timed off the foreground video only.
      // Wait for metadata so duration is known; if it never arrives or the
      // video errors, fall back to a fully-visible static line.
      const startReveal = () => resetIntroMechanismReveal();
      if (isFinite(fg.duration) && fg.duration > 0) {
        startReveal();
      } else {
        fg.addEventListener("loadedmetadata", startReveal, { once: true });
        fg.addEventListener("canplay", startReveal, { once: true });
      }
      fg.addEventListener("error", handleIntroVideoFailure);
      fg.addEventListener("stalled", () => {
        // If we still have no duration after a long stall, surface the line.
        if (!isFinite(fg.duration) || fg.duration <= 0) handleIntroVideoFailure();
      });
    } else {
      // No foreground video at all — keep the line statically visible.
      handleIntroVideoFailure();
    }
    return;
  }

  // Leaving Screen 0 — cancel any pending replay and stop the reveal RAF.
  clearIntroReplay();
  cancelIntroMechanismReveal();

  document.getElementById("btn-prev")?.addEventListener("click", prev);
  document.getElementById("btn-next")?.addEventListener("click", next);
  document.getElementById("btn-restart")?.addEventListener("click", restart);
  document.getElementById("btn-appendix")?.addEventListener("click", () => openAppendix(state.appendix || appendixForScreen(state.screen)));
  document.getElementById("btn-appendix-close")?.addEventListener("click", closeAppendix);

  document.querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => jumpTo(parseInt(el.dataset.jump, 10)));
  });
  document.querySelectorAll("[data-app-tab]").forEach(el => {
    el.addEventListener("click", () => selectAppendix(el.dataset.appTab));
  });
  document.querySelectorAll("[data-appendix]").forEach(el => {
    el.addEventListener("click", () => openAppendix(el.dataset.appendix));
  });
  document.getElementById("appendix-pane")?.addEventListener("click", (e) => {
    if (e.target.id === "appendix-pane") closeAppendix();
  });
}

/* ---------- Keyboard ---------- */
window.addEventListener("keydown", (e) => {
  // Hidden presenter shortcut — numeric keypad "+" restarts the opening video.
  if (state.screen === 0 && (e.code === "NumpadAdd" || e.key === "+")) {
    e.preventDefault();
    restartIntroVideo();
    return;
  }
  if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { e.preventDefault(); next(); }
  else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); prev(); }
  else if (e.key === "Escape") { if (state.appendix) closeAppendix(); }
  else if (e.key === "Home") { restart(); }
});

/* ---------- Stage scaling (v8A-4) ----------
   Screens 1–10 fill the viewport directly via CSS (no transform).
   Screen 0 keeps its full-bleed override. We deliberately do NOT
   apply a scale transform on Screens 1–10 — that was the source of
   the visible left/right empty side zones in v8A-3. */
function fitStage() {
  const stage = document.getElementById("stage");
  if (!stage) return;
  // Always clear any prior transform; layout is CSS-driven from v8A-4.
  stage.style.transform = "";
}
window.addEventListener("resize", fitStage);

/* ---------- Boot ---------- */
render();
</script>
</body>
</html>
